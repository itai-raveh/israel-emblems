<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Israeli Municipal Emblems</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2eb;
    --surface: #fff;
    --border: #d6d0c4;
    --text: #1a1814;
    --muted: #7a7468;
    --accent: #2d5a8e;

    --svg:     #1a6b3a;
    --svg-bg:  #e8f5ee;
    --png:     #7a5a00;
    --png-bg:  #fff8e0;
    --wrong:   #8b1a1a;
    --wrong-bg:#fdecea;
    --missing: #444;
    --missing-bg: #f0f0f0;
    --error:   #5a2d8b;
    --error-bg:#f3eeff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
  }

  header {
    padding: 48px 40px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: 36px;
    font-weight: 300;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  header h1 em {
    font-style: italic;
    color: var(--accent);
  }

  header p {
    color: var(--muted);
    font-size: 12px;
  }

  .stats {
    display: flex;
    gap: 24px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .stat {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }

  .stat-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .controls {
    padding: 20px 40px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .controls input {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface);
    color: var(--text);
    width: 220px;
    outline: none;
  }

  .controls input:focus { border-color: var(--accent); }

  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .count {
    margin-left: auto;
    color: var(--muted);
    font-size: 11px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1px;
    background: var(--border);
    padding: 0;
  }

  .card {
    background: var(--surface);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
  }

  .card:hover { background: #fafaf7; }

  .emblem-wrap {
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    border-radius: 4px;
    overflow: hidden;
  }

  .emblem-wrap img {
    max-height: 90px;
    max-width: 100%;
    object-fit: contain;
  }

  .emblem-wrap .no-image {
    color: var(--border);
    font-size: 28px;
  }

  .card-name {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 14px;
    line-height: 1.3;
  }

  .card-name-he {
    font-size: 11px;
    color: var(--muted);
    direction: rtl;
    text-align: right;
  }

  .card-meta {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .badge-found-svg  { background: var(--svg-bg);     color: var(--svg);     }
  .badge-found-png  { background: var(--png-bg);     color: var(--png);     }
  .badge-wrong-file { background: var(--wrong-bg);   color: var(--wrong);   }
  .badge-not-found  { background: var(--missing-bg); color: var(--missing); }
  .badge-error      { background: var(--error-bg);   color: var(--error);   }
  .badge-not-yet    { background: var(--missing-bg); color: var(--missing); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 8px;
    max-width: 560px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 32px;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--muted);
    line-height: 1;
  }

  .modal-emblem {
    text-align: center;
    padding: 24px;
    background: var(--bg);
    border-radius: 6px;
    margin-bottom: 24px;
  }

  .modal-emblem img {
    max-height: 180px;
    max-width: 100%;
    object-fit: contain;
  }

  .modal h2 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 22px;
    margin-bottom: 4px;
  }

  .modal-he {
    direction: rtl;
    color: var(--muted);
    margin-bottom: 20px;
    font-size: 14px;
  }

  .modal-fields {
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: 8px 12px;
    font-size: 12px;
  }

  .modal-label { color: var(--muted); }
  .modal-value { word-break: break-all; }

  .modal-value a {
    color: var(--accent);
    text-decoration: none;
  }
  .modal-value a:hover { text-decoration: underline; }

  .modal-notes {
    margin-top: 20px;
    padding: 12px;
    background: var(--wrong-bg);
    border-radius: 4px;
    border-left: 3px solid var(--wrong);
    font-size: 12px;
    color: var(--wrong);
  }

  .empty {
    grid-column: 1 / -1;
    padding: 80px;
    text-align: center;
    color: var(--muted);
    background: var(--surface);
  }

  .loading {
    padding: 80px;
    text-align: center;
    color: var(--muted);
  }
</style>
</head>
<body>

<header>
  <h1>Israeli Municipal <em>Emblems</em></h1>
  <p>Encyclopedia / index of coats of arms for all ~250 Israeli municipalities</p>
  <div class="stats" id="stats"></div>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="Search by name, ID, district…">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="found-svg">✅ SVG</button>
  <button class="filter-btn" data-filter="found-png">🟡 PNG</button>
  <button class="filter-btn" data-filter="wrong-file">⚠️ Wrong</button>
  <button class="filter-btn" data-filter="not-found">❌ Missing</button>
  <span class="count" id="count"></span>
</div>

<div class="grid" id="grid">
  <div class="loading">Loading municipalities…</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
// IMPORTANT: Replace YOUR_USERNAME and YOUR_REPO with your actual GitHub details
const GITHUB_USER = 'YOUR_USERNAME';
const GITHUB_REPO = 'YOUR_REPO';
const BRANCH      = 'main';

const RAW = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}`;
const CSV_URL = `${RAW}/data/municipalities.csv`;

// ── Parse CSV ─────────────────────────────────────────────────────────────────
function parseCSV(text) {
  // Handle BOM
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
  const lines = text.split('\n').filter(l => l.trim());
  const headers = lines[0].split(',');
  return lines.slice(1).map(line => {
    // Handle commas inside quoted fields
    const vals = [];
    let cur = '', inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { vals.push(cur); cur = ''; }
      else cur += ch;
    }
    vals.push(cur);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
    return obj;
  }).filter(r => r.id);
}

// ── Find image file for a municipality ───────────────────────────────────────
// Filename format: {id}__{name_he}__{type}__{district}__{culture}__{commons_base}.{ext}
// We don't know the exact filename, so we try to match by id prefix
function imageUrl(muni, allFiles) {
  const prefix = muni.id + '__';
  const svgFile = allFiles.svg.find(f => f.startsWith(prefix));
  if (svgFile) return { url: `${RAW}/emblems/svg/${encodeURIComponent(svgFile)}`, type: 'svg' };
  const pngFile = allFiles.png.find(f => f.startsWith(prefix));
  if (pngFile) return { url: `${RAW}/emblems/png/${encodeURIComponent(pngFile)}`, type: 'png' };
  return null;
}

// ── Status badge ──────────────────────────────────────────────────────────────
function badge(status) {
  const labels = {
    'found-svg':  '✅ SVG',
    'found-png':  '🟡 PNG',
    'wrong-file': '⚠️ Wrong',
    'not-found':  '❌ Missing',
    'not-yet':    '⬜ Not yet',
    'error':      '🔴 Error',
  };
  const cls = status ? status.replace(/[^a-z-]/g, '') : 'error';
  return `<span class="badge badge-${cls}">${labels[status] || status}</span>`;
}

// ── Render grid ───────────────────────────────────────────────────────────────
function renderGrid(data, allFiles, filter, search) {
  const grid = document.getElementById('grid');
  const q = search.toLowerCase();

  const filtered = data.filter(m => {
    const matchFilter = filter === 'all' || m.status === filter;
    const matchSearch = !q ||
      m.id.includes(q) ||
      (m.name_en || '').toLowerCase().includes(q) ||
      (m.name_he || '').includes(search) ||
      (m.district || '').includes(q) ||
      (m.type || '').includes(q);
    return matchFilter && matchSearch;
  });

  document.getElementById('count').textContent = `${filtered.length} municipalities`;

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">No results found.</div>';
    return;
  }

  grid.innerHTML = filtered.map(m => {
    const img = imageUrl(m, allFiles);
    const imgHtml = img
      ? `<img src="${img.url}" alt="${m.name_en}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">`
      : '';
    const fallback = `<span class="no-image" ${img ? 'style="display:none"' : ''}>◻</span>`;

    return `<div class="card" data-id="${m.id}">
      <div class="emblem-wrap">${imgHtml}${fallback}</div>
      <div>
        <div class="card-name">${m.name_en}</div>
        <div class="card-name-he">${m.name_he}</div>
      </div>
      <div class="card-meta">${m.type} · ${m.district}</div>
      ${badge(m.status)}
    </div>`;
  }).join('');

  // Card click → modal
  grid.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      const muni = data.find(m => m.id === card.dataset.id);
      openModal(muni, allFiles);
    });
  });
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(m, allFiles) {
  const img = imageUrl(m, allFiles);
  const commonsUrl = m.commons_url
    ? `<a href="${m.commons_url}" target="_blank">${(m.commons_filename || '').replace('File:', '')}</a>`
    : '—';

  const imgHtml = img
    ? `<img src="${img.url}" alt="${m.name_en}">`
    : '<span style="color:#ccc;font-size:48px">◻</span>';

  const notesHtml = m.notes
    ? `<div class="modal-notes">⚠️ ${m.notes}</div>`
    : '';

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-emblem">${imgHtml}</div>
    <h2>${m.name_en}</h2>
    <div class="modal-he">${m.name_he}</div>
    <div style="margin-bottom:16px">${badge(m.status)}</div>
    <div class="modal-fields">
      <span class="modal-label">ID</span>
      <span class="modal-value">${m.id}</span>
      <span class="modal-label">Type</span>
      <span class="modal-value">${m.type}</span>
      <span class="modal-label">District</span>
      <span class="modal-value">${m.district}</span>
      <span class="modal-label">Culture</span>
      <span class="modal-value">${m.culture}</span>
      <span class="modal-label">Format</span>
      <span class="modal-value">${m.format || '—'}</span>
      <span class="modal-label">Commons file</span>
      <span class="modal-value">${commonsUrl}</span>
      ${m.correct_commons_url ? `
      <span class="modal-label">Correct URL</span>
      <span class="modal-value"><a href="${m.correct_commons_url}" target="_blank">→ view</a></span>
      ` : ''}
    </div>
    ${notesHtml}
  `;

  document.getElementById('modal-overlay').classList.add('open');
}

// ── Stats bar ─────────────────────────────────────────────────────────────────
function renderStats(data) {
  const counts = {};
  data.forEach(m => { counts[m.status] = (counts[m.status] || 0) + 1; });
  const items = [
    { label: 'SVG',     key: 'found-svg',  color: '#1a6b3a' },
    { label: 'PNG',     key: 'found-png',  color: '#7a5a00' },
    { label: 'Wrong',   key: 'wrong-file', color: '#8b1a1a' },
    { label: 'Missing', key: 'not-found',  color: '#444'    },
    { label: 'Not yet', key: 'not-yet',    color: '#aaa'    },
  ];
  document.getElementById('stats').innerHTML = items.map(i =>
    `<div class="stat">
      <div class="stat-dot" style="background:${i.color}"></div>
      <span>${counts[i.key] || 0} ${i.label}</span>
    </div>`
  ).join('');
}

// ── GitHub Contents API — list files in a folder ──────────────────────────────
async function listFiles(folder) {
  const url = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${folder}?ref=${BRANCH}`;
  try {
    const r = await fetch(url);
    if (!r.ok) return [];
    const data = await r.json();
    return data.map(f => f.name);
  } catch { return []; }
}

// ── Main ──────────────────────────────────────────────────────────────────────
async function main() {
  // Load CSV + file lists in parallel
  const [csvText, svgFiles, pngFiles] = await Promise.all([
    fetch(CSV_URL).then(r => r.text()),
    listFiles('emblems/svg'),
    listFiles('emblems/png'),
  ]);

  const data = parseCSV(csvText);
  const allFiles = { svg: svgFiles, png: pngFiles };

  renderStats(data);

  let currentFilter = 'all';
  let currentSearch = '';

  function refresh() {
    renderGrid(data, allFiles, currentFilter, currentSearch);
  }

  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      refresh();
    });
  });

  // Search
  document.getElementById('search').addEventListener('input', e => {
    currentSearch = e.target.value;
    refresh();
  });

  // Modal close
  document.getElementById('modal-close').addEventListener('click', () => {
    document.getElementById('modal-overlay').classList.remove('open');
  });
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay'))
      document.getElementById('modal-overlay').classList.remove('open');
  });

  refresh();
}

main();
</script>
</body>
</html>
