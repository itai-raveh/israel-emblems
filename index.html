<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Israeli Municipal Emblems</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f2eb;--surface:#fff;--border:#d6d0c4;--text:#1a1814;--muted:#7a7468;--accent:#2d5a8e;
    --svg:#1a6b3a;--svg-bg:#e8f5ee;--png:#7a5a00;--png-bg:#fff8e0;
    --wrong:#8b1a1a;--wrong-bg:#fdecea;--missing:#444;--missing-bg:#f0f0f0;
    --error:#5a2d8b;--error-bg:#f3eeff;--accuracy:#1a4a6b;--accuracy-bg:#e8f0fb;
    --small:#6b3a1a;--small-bg:#fdf0e8;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;min-height:100vh;}
  header{padding:48px 40px 32px;border-bottom:1px solid var(--border);background:var(--surface);}
  header h1{font-family:'Fraunces',serif;font-size:36px;font-weight:300;letter-spacing:-0.5px;margin-bottom:6px;}
  header h1 em{font-style:italic;color:var(--accent);}
  header p{color:var(--muted);font-size:12px;}
  .stats{display:flex;gap:24px;margin-top:24px;flex-wrap:wrap;}
  .stat{display:flex;align-items:center;gap:8px;font-size:12px;}
  .stat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .controls{padding:14px 40px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;display:flex;flex-direction:column;gap:10px;}
  .controls-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .controls input[type="text"]{font-family:'DM Mono',monospace;font-size:12px;padding:7px 12px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);width:220px;outline:none;}
  .controls input[type="text"]:focus{border-color:var(--accent);}
  .controls-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;}
  .btn-group{display:flex;gap:4px;flex-wrap:wrap;}
  .filter-btn{font-family:'DM Mono',monospace;font-size:11px;padding:5px 10px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--muted);cursor:pointer;transition:all 0.12s;white-space:nowrap;}
  .filter-btn:hover{border-color:var(--accent);color:var(--accent);}
  .filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .sort-select{font-family:'DM Mono',monospace;font-size:11px;padding:5px 10px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);cursor:pointer;outline:none;}
  .view-toggle{margin-left:auto;display:flex;gap:4px;}
  .view-btn{font-family:'DM Mono',monospace;font-size:16px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--muted);cursor:pointer;line-height:1;}
  .view-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .count{color:var(--muted);font-size:11px;white-space:nowrap;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1px;background:var(--border);}
  .card{background:var(--surface);padding:16px;display:flex;flex-direction:column;gap:8px;cursor:pointer;transition:background 0.1s;}
  .card:hover{background:#fafaf7;}
  .emblem-wrap{height:90px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:4px;overflow:hidden;}
  .emblem-wrap img{max-height:80px;max-width:100%;object-fit:contain;}
  .no-image{color:var(--border);font-size:28px;}
  .card-name{font-family:'Fraunces',serif;font-weight:300;font-size:13px;line-height:1.3;}
  .card-name-he{font-size:10px;color:var(--muted);direction:rtl;text-align:right;}
  .card-meta{font-size:10px;color:var(--muted);}
  .card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px;}
  .list-view{background:var(--surface);}
  .list-header{display:grid;grid-template-columns:60px 1fr 130px 100px 180px;gap:12px;padding:10px 20px;background:var(--bg);border-bottom:2px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);}
  .list-row{display:grid;grid-template-columns:60px 1fr 130px 100px 180px;gap:12px;padding:10px 20px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background 0.1s;}
  .list-row:hover{background:#fafaf7;}
  .list-thumb{width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:3px;overflow:hidden;}
  .list-thumb img{max-width:44px;max-height:44px;object-fit:contain;}
  .list-name{font-family:'Fraunces',serif;font-weight:300;font-size:14px;}
  .list-tags{display:flex;flex-wrap:wrap;gap:3px;}
  .badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:3px;font-weight:500;letter-spacing:0.2px;white-space:nowrap;}
  .badge-found-svg{background:var(--svg-bg);color:var(--svg);}
  .badge-found-png{background:var(--png-bg);color:var(--png);}
  .badge-wrong-file{background:var(--wrong-bg);color:var(--wrong);}
  .badge-not-found{background:var(--missing-bg);color:var(--missing);}
  .badge-error{background:var(--error-bg);color:var(--error);}
  .badge-not-yet{background:var(--missing-bg);color:var(--missing);}
  .badge-needs-accuracy{background:var(--accuracy-bg);color:var(--accuracy);}
  .badge-small-file{background:var(--small-bg);color:var(--small);}
  .badge-jewish{background:#eef2ff;color:#3730a3;}
  .badge-arab{background:#fef3c7;color:#92400e;}
  .badge-mixed{background:#f0fdf4;color:#166534;}
  .badge-bedouin{background:#fdf4ff;color:#6b21a8;}
  .badge-city{background:#eff6ff;color:#1d4ed8;}
  .badge-local{background:#f0fdf4;color:#15803d;}
  .badge-regional{background:#fdf4ff;color:#7e22ce;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;padding:24px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:8px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;padding:32px;position:relative;}
  .modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1;}
  .modal-emblem{text-align:center;padding:24px;background:var(--bg);border-radius:6px;margin-bottom:20px;}
  .modal-emblem img{max-height:180px;max-width:100%;object-fit:contain;}
  .modal h2{font-family:'Fraunces',serif;font-weight:300;font-size:22px;margin-bottom:4px;}
  .modal-he{direction:rtl;color:var(--muted);margin-bottom:16px;font-size:14px;}
  .modal-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:20px;}
  .modal-fields{display:grid;grid-template-columns:130px 1fr;gap:8px 12px;font-size:12px;}
  .modal-label{color:var(--muted);}
  .modal-value{word-break:break-all;}
  .modal-value a{color:var(--accent);text-decoration:none;}
  .modal-value a:hover{text-decoration:underline;}
  .modal-notes{margin-top:20px;padding:12px;background:var(--wrong-bg);border-radius:4px;border-left:3px solid var(--wrong);font-size:12px;color:var(--wrong);}
  .empty{padding:80px;text-align:center;color:var(--muted);background:var(--surface);}
  .loading{padding:80px;text-align:center;color:var(--muted);}
</style>
</head>
<body>
<header>
  <h1>Israeli Municipal <em>Emblems</em></h1>
  <p>Encyclopedia / index of coats of arms for all ~250 Israeli municipalities</p>
  <div class="stats" id="stats"></div>
</header>
<div class="controls">
  <div class="controls-row">
    <input type="text" id="search" placeholder="Search by name, district, type…">
    <span class="controls-label">Sort:</span>
    <select class="sort-select" id="sort">
      <option value="name">Name A–Z</option>
      <option value="name-desc">Name Z–A</option>
      <option value="status">Status</option>
      <option value="type">Type</option>
      <option value="district">District</option>
    </select>
    <span class="count" id="count"></span>
    <div class="view-toggle">
      <button class="view-btn active" id="btn-grid" title="Grid view">⊞</button>
      <button class="view-btn" id="btn-list" title="List view">☰</button>
    </div>
  </div>
  <div class="controls-row">
    <span class="controls-label">Status:</span>
    <div class="btn-group">
      <button class="filter-btn active" data-group="status" data-value="all">All</button>
      <button class="filter-btn" data-group="status" data-value="found-svg">✅ SVG</button>
      <button class="filter-btn" data-group="status" data-value="found-png">🟡 PNG</button>
      <button class="filter-btn" data-group="status" data-value="wrong-file">⚠️ Wrong</button>
      <button class="filter-btn" data-group="status" data-value="not-found">❌ Missing</button>
    </div>
  </div>
  <div class="controls-row">
    <span class="controls-label">Flags:</span>
    <div class="btn-group">
      <button class="filter-btn" data-group="flag" data-value="needs-accuracy">🔍 Needs accuracy</button>
      <button class="filter-btn" data-group="flag" data-value="small-file">📐 Small file</button>
    </div>
    <span class="controls-label" style="margin-left:12px">Type:</span>
    <div class="btn-group">
      <button class="filter-btn" data-group="type" data-value="city">City</button>
      <button class="filter-btn" data-group="type" data-value="local">Local</button>
      <button class="filter-btn" data-group="type" data-value="regional">Regional</button>
    </div>
    <span class="controls-label" style="margin-left:12px">Culture:</span>
    <div class="btn-group">
      <button class="filter-btn" data-group="culture" data-value="jewish">Jewish</button>
      <button class="filter-btn" data-group="culture" data-value="arab">Arab</button>
      <button class="filter-btn" data-group="culture" data-value="mixed">Mixed</button>
      <button class="filter-btn" data-group="culture" data-value="bedouin">Bedouin</button>
    </div>
  </div>
</div>
<div id="main-content"><div class="loading">Loading municipalities…</div></div>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>
<script>
const GITHUB_USER='itai-raveh',GITHUB_REPO='israel-emblems',BRANCH='main';
const RAW=`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}`;
const CSV_URL=`${RAW}/data/municipalities.csv`;

// IDs to override status — rosh-pina and kiryat-tivon are confirmed good
const STATUS_OVERRIDES={'rosh-pina':'found-svg','kiryat-tivon':'found-svg'};

// Add IDs here to flag as needing accuracy review
const NEEDS_ACCURACY=new Set([]);

function parseCSV(text){
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  const lines=text.split('\n').filter(l=>l.trim());
  const headers=lines[0].split(',');
  return lines.slice(1).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(const ch of line){
      if(ch==='"')inQ=!inQ;
      else if(ch===','&&!inQ){vals.push(cur);cur='';}
      else cur+=ch;
    }
    vals.push(cur);
    const obj={};
    headers.forEach((h,i)=>obj[h.trim()]=(vals[i]||'').trim());
    return obj;
  }).filter(r=>r.id);
}

function imageUrl(muni,allFiles){
  const prefix=muni.id+'__';
  const svgFile=allFiles.svg.find(f=>f.startsWith(prefix));
  if(svgFile)return{url:`${RAW}/emblems/svg/${encodeURIComponent(svgFile)}`,type:'svg'};
  const pngFile=allFiles.png.find(f=>f.startsWith(prefix));
  if(pngFile)return{url:`${RAW}/emblems/png/${encodeURIComponent(pngFile)}`,type:'png'};
  return null;
}

function enrich(data,allFiles){
  return data.map(m=>{
    if(STATUS_OVERRIDES[m.id])m.status=STATUS_OVERRIDES[m.id];
    m._img=imageUrl(m,allFiles);
    m._needsAccuracy=NEEDS_ACCURACY.has(m.id)||(m.notes||'').includes('needs-accuracy');
    const w=parseFloat(m.width_px)||0,h=parseFloat(m.height_px)||0;
    m._smallFile=(m.format==='PNG'||m.status==='found-png')&&w>0&&w<150&&h<150;
    return m;
  });
}

const STATUS_LABELS={'found-svg':'✅ SVG','found-png':'🟡 PNG','wrong-file':'⚠️ Wrong','not-found':'❌ Missing','not-yet':'⬜ Not yet','error':'🔴 Error'};

function sBadge(status){const cls=(status||'error').replace(/[^a-z-]/g,'');return`<span class="badge badge-${cls}">${STATUS_LABELS[status]||status}</span>`;}
function cBadge(culture){if(!culture)return'';return`<span class="badge badge-${culture.toLowerCase()}">${culture}</span>`;}
function tBadge(type){if(!type)return'';return`<span class="badge badge-${type.toLowerCase()}">${type}</span>`;}
function xBadges(m){let o='';if(m._needsAccuracy)o+=`<span class="badge badge-needs-accuracy">🔍 Needs accuracy</span>`;if(m._smallFile)o+=`<span class="badge badge-small-file">📐 Small</span>`;return o;}

const state={view:'grid',sort:'name',search:'',filters:{status:new Set(),flag:new Set(),type:new Set(),culture:new Set()}};
let DATA=[];

function applyFilters(data){
  const q=state.search.toLowerCase();
  const{status,flag,type,culture}=state.filters;
  return data.filter(m=>{
    if(q&&![m.id,m.name_en,m.name_he,m.district,m.type,m.culture].some(v=>(v||'').toLowerCase().includes(q)))return false;
    if(status.size&&!status.has(m.status))return false;
    if(type.size&&!type.has((m.type||'').toLowerCase()))return false;
    if(culture.size&&!culture.has((m.culture||'').toLowerCase()))return false;
    if(flag.has('needs-accuracy')&&!m._needsAccuracy)return false;
    if(flag.has('small-file')&&!m._smallFile)return false;
    return true;
  });
}

function applySort(data){
  return[...data].sort((a,b)=>{
    switch(state.sort){
      case'name':return(a.name_en||'').localeCompare(b.name_en||'');
      case'name-desc':return(b.name_en||'').localeCompare(a.name_en||'');
      case'status':return(a.status||'').localeCompare(b.status||'');
      case'type':return(a.type||'').localeCompare(b.type||'');
      case'district':return(a.district||'').localeCompare(b.district||'');
      default:return 0;
    }
  });
}

function imgHTML(m,size=80){
  if(!m._img)return`<span class="no-image">◻</span>`;
  return`<img src="${m._img.url}" alt="${m.name_en}" loading="lazy" style="max-height:${size}px;max-width:100%;object-fit:contain" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><span class="no-image" style="display:none">◻</span>`;
}

function cardHTML(m){
  return`<div class="card" data-id="${m.id}">
    <div class="emblem-wrap">${imgHTML(m,80)}</div>
    <div><div class="card-name">${m.name_en}</div><div class="card-name-he">${m.name_he}</div></div>
    <div class="card-meta">${m.district}</div>
    <div class="card-tags">${sBadge(m.status)}${tBadge(m.type)}${cBadge(m.culture)}${xBadges(m)}</div>
  </div>`;
}

function listRowHTML(m){
  return`<div class="list-row" data-id="${m.id}">
    <div class="list-thumb">${imgHTML(m,44)}</div>
    <div><div class="list-name">${m.name_en}</div><div class="card-meta">${m.district}</div></div>
    <div style="direction:rtl;font-size:12px;color:var(--muted)">${m.name_he}</div>
    <div>${tBadge(m.type)}</div>
    <div class="list-tags">${sBadge(m.status)}${cBadge(m.culture)}${xBadges(m)}</div>
  </div>`;
}

function render(){
  const filtered=applySort(applyFilters(DATA));
  document.getElementById('count').textContent=`${filtered.length} / ${DATA.length}`;
  const container=document.getElementById('main-content');
  if(!filtered.length){container.innerHTML='<div class="empty">No results found.</div>';return;}
  if(state.view==='grid'){
    container.innerHTML=`<div class="grid">${filtered.map(cardHTML).join('')}</div>`;
  }else{
    container.innerHTML=`<div class="list-view">
      <div class="list-header"><div>Emblem</div><div>Name</div><div>Hebrew</div><div>Type</div><div>Tags</div></div>
      ${filtered.map(listRowHTML).join('')}
    </div>`;
  }
  container.querySelectorAll('[data-id]').forEach(el=>{
    el.addEventListener('click',()=>{const m=DATA.find(d=>d.id===el.dataset.id);if(m)openModal(m);});
  });
}

function renderStats(data){
  const counts={};
  data.forEach(m=>{counts[m.status]=(counts[m.status]||0)+1;});
  const items=[
    {label:'SVG',key:'found-svg',color:'#1a6b3a'},
    {label:'PNG',key:'found-png',color:'#7a5a00'},
    {label:'Wrong',key:'wrong-file',color:'#8b1a1a'},
    {label:'Missing',key:'not-found',color:'#444'},
  ];
  document.getElementById('stats').innerHTML=items.map(i=>
    `<div class="stat"><div class="stat-dot" style="background:${i.color}"></div><span>${counts[i.key]||0} ${i.label}</span></div>`
  ).join('');
}

function openModal(m){
  const imgHtml=m._img?`<img src="${m._img.url}" alt="${m.name_en}">`:'<span style="color:#ccc;font-size:48px">◻</span>';
  const commonsLink=m.commons_url?`<a href="${m.commons_url}" target="_blank">${(m.commons_filename||'').replace('File:','')}</a>`:'—';
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-emblem">${imgHtml}</div>
    <h2>${m.name_en}</h2>
    <div class="modal-he">${m.name_he}</div>
    <div class="modal-tags">${sBadge(m.status)}${tBadge(m.type)}${cBadge(m.culture)}${xBadges(m)}</div>
    <div class="modal-fields">
      <span class="modal-label">ID</span><span class="modal-value">${m.id}</span>
      <span class="modal-label">District</span><span class="modal-value">${m.district}</span>
      <span class="modal-label">Format</span><span class="modal-value">${m.format||'—'}</span>
      <span class="modal-label">Dimensions</span><span class="modal-value">${m.width_px&&m.height_px?m.width_px+' × '+m.height_px+' px':'—'}</span>
      <span class="modal-label">Commons file</span><span class="modal-value">${commonsLink}</span>
      ${m.correct_commons_url?`<span class="modal-label">Correct URL</span><span class="modal-value"><a href="${m.correct_commons_url}" target="_blank">→ view</a></span>`:''}
      ${m.notes?`<span class="modal-label">Notes</span><span class="modal-value">${m.notes}</span>`:''}
    </div>
    ${m.status==='wrong-file'?`<div class="modal-notes">⚠️ This file was incorrectly grabbed by the scraper and needs manual replacement.</div>`:''}
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

async function listFiles(folder){
  const url=`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${folder}?ref=${BRANCH}`;
  try{const r=await fetch(url);if(!r.ok)return[];return(await r.json()).map(f=>f.name);}
  catch{return[];}
}

async function main(){
  const[csvText,svgFiles,pngFiles]=await Promise.all([
    fetch(CSV_URL).then(r=>r.text()),
    listFiles('emblems/svg'),
    listFiles('emblems/png'),
  ]);
  DATA=enrich(parseCSV(csvText),{svg:svgFiles,png:pngFiles});
  renderStats(DATA);
  render();

  document.getElementById('search').addEventListener('input',e=>{state.search=e.target.value;render();});
  document.getElementById('sort').addEventListener('change',e=>{state.sort=e.target.value;render();});

  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const group=btn.dataset.group,value=btn.dataset.value;
      if(group==='status'){
        if(value==='all'){
          state.filters.status.clear();
          document.querySelectorAll('[data-group="status"]').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
        }else{
          document.querySelector('[data-group="status"][data-value="all"]').classList.remove('active');
          if(state.filters.status.has(value)){state.filters.status.delete(value);btn.classList.remove('active');}
          else{state.filters.status.add(value);btn.classList.add('active');}
          if(state.filters.status.size===0)document.querySelector('[data-group="status"][data-value="all"]').classList.add('active');
        }
      }else{
        if(state.filters[group].has(value)){state.filters[group].delete(value);btn.classList.remove('active');}
        else{state.filters[group].add(value);btn.classList.add('active');}
      }
      render();
    });
  });

  document.getElementById('btn-grid').addEventListener('click',()=>{state.view='grid';document.getElementById('btn-grid').classList.add('active');document.getElementById('btn-list').classList.remove('active');render();});
  document.getElementById('btn-list').addEventListener('click',()=>{state.view='list';document.getElementById('btn-list').classList.add('active');document.getElementById('btn-grid').classList.remove('active');render();});
  document.getElementById('modal-close').addEventListener('click',()=>document.getElementById('modal-overlay').classList.remove('open'));
  document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').classList.remove('open');});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('modal-overlay').classList.remove('open');});
}
main();
</script>
</body>
</html>
