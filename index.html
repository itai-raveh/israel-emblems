<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Israeli Municipal Emblems</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f2eb;--surface:#fff;--border:#d6d0c4;--text:#1a1814;--muted:#7a7468;--accent:#2d5a8e;
    --svg:#1a6b3a;--svg-bg:#e8f5ee;
    --logo:#3730a3;--logo-bg:#eef2ff;
    --missing:#444;--missing-bg:#f0f0f0;
    --size:#6b3a1a;--size-bg:#fdf0e8;
    --obsolete:#5a4a00;--obsolete-bg:#fdf8e0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{overflow-x:hidden;width:100%;}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:13px;min-height:100vh;}
  header{padding:48px 40px 32px;border-bottom:1px solid var(--border);background:var(--surface);}
  header h1{font-family:'Fraunces',serif;font-size:36px;font-weight:300;letter-spacing:-0.5px;margin-bottom:6px;}
  header h1 em{font-style:italic;color:var(--accent);}
  header p{color:var(--muted);font-size:12px;}
  .stats{display:flex;gap:24px;margin-top:24px;flex-wrap:wrap;}
  .stat{display:flex;align-items:center;gap:8px;font-size:12px;}
  .stat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

  .controls{padding:12px 40px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;display:flex;flex-direction:column;gap:8px;left:0;right:0;width:100%;}
  .controls-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .controls input[type="text"]{font-family:'DM Mono',monospace;font-size:12px;padding:6px 12px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);width:200px;outline:none;}
  .controls input[type="text"]:focus{border-color:var(--accent);}
  .controls-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;}
  .btn-group{display:flex;gap:3px;flex-wrap:wrap;}
  .filter-btn{font-family:'DM Mono',monospace;font-size:11px;padding:4px 9px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--muted);cursor:pointer;transition:all 0.12s;white-space:nowrap;}
  .filter-btn:hover{border-color:var(--accent);color:var(--accent);}
  .filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .sort-select{font-family:'DM Mono',monospace;font-size:11px;padding:4px 9px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);cursor:pointer;outline:none;}
  .right-controls{margin-left:auto;display:flex;gap:6px;align-items:center;}
  .flag-btn{font-family:'DM Mono',monospace;font-size:11px;padding:4px 9px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--muted);cursor:pointer;transition:all 0.12s;white-space:nowrap;}
  .flag-btn:hover{border-color:var(--accent);color:var(--accent);}
  .flag-btn.active-size{background:var(--size-bg);color:var(--size);border-color:var(--size);}
  .flag-btn.active-missing{background:var(--missing-bg);color:var(--missing);border-color:#bbb;}
  .view-btn{font-family:'DM Mono',monospace;font-size:16px;padding:3px 7px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--muted);cursor:pointer;line-height:1;}
  .view-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .count{color:var(--muted);font-size:11px;white-space:nowrap;}
  .export-btn{font-family:'DM Mono',monospace;font-size:11px;padding:4px 9px;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--muted);cursor:pointer;}
  .export-btn:hover{border-color:var(--accent);color:var(--accent);}
  .vdivider{width:1px;height:20px;background:var(--border);flex-shrink:0;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1px;background:var(--border);}
  .card{background:var(--surface);padding:14px;display:flex;flex-direction:column;gap:7px;cursor:pointer;transition:background 0.1s;}
  .card:hover{background:#fafaf7;}
  .emblem-wrap{height:90px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:4px;overflow:hidden;position:relative;}
  .emblem-wrap img{max-height:80px;max-width:100%;object-fit:contain;}
  .no-image{color:var(--border);font-size:28px;}
  .img-tier{position:absolute;bottom:3px;right:3px;font-size:9px;padding:1px 4px;border-radius:2px;opacity:0.7;font-weight:500;}
  .img-tier.t1{background:var(--svg-bg);color:var(--svg);}
  .img-tier.t2{background:#fff8e0;color:#7a5a00;}
  .img-tier.t3,.img-tier.t4{background:#e8eeff;color:#3730a3;}
  .card-name{font-family:'Fraunces',serif;font-weight:300;font-size:13px;line-height:1.3;}
  .card-name-he{font-size:10px;color:var(--muted);direction:rtl;text-align:right;}
  .card-meta{font-size:10px;color:var(--muted);}
  .card-tags{display:flex;flex-wrap:wrap;gap:3px;}
  .card-ticks{display:flex;gap:4px;padding-top:8px;border-top:1px solid var(--border);margin-top:2px;}
  .tick{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);cursor:pointer;user-select:none;padding:3px 7px;border-radius:3px;flex:1;justify-content:center;transition:all 0.1s;border:1px solid transparent;}
  .tick:hover{background:var(--bg);}
  .tick input{width:11px;height:11px;cursor:pointer;margin:0;flex-shrink:0;accent-color:var(--accent);}
  .tick.t-missing.on{color:var(--missing);border-color:#ddd;background:var(--missing-bg);}
  .tick.t-size.on{color:var(--size);border-color:var(--size-bg);background:var(--size-bg);}

  .badge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:3px;font-weight:500;white-space:nowrap;}
  .badge-found-svg,.badge-found-png{background:var(--svg-bg);color:var(--svg);}
  .badge-logo{background:var(--logo-bg);color:var(--logo);}
  .badge-not-found,.badge-not-yet,.badge-error{background:var(--missing-bg);color:var(--missing);}
  .badge-size{background:var(--size-bg);color:var(--size);}
  .badge-obsolete{background:var(--obsolete-bg);color:var(--obsolete);}
  .badge-jewish{background:#eef2ff;color:#3730a3;}
  .badge-arab{background:#fef3c7;color:#92400e;}
  .badge-mixed{background:#f0fdf4;color:#166534;}
  .badge-bedouin{background:#fdf4ff;color:#6b21a8;}
  .badge-druze{background:#fff0f8;color:#9d174d;}
  .badge-circassian{background:#f0f4ff;color:#1e3a8a;}
  .badge-city{background:#eff6ff;color:#1d4ed8;}
  .badge-local{background:#f0fdf4;color:#15803d;}
  .badge-regional{background:#fdf4ff;color:#7e22ce;}
  .badge-palestinian{background:#fef9ec;color:#92400e;}
  .badge-west-bank{background:#fff7ed;color:#9a3412;}
  .badge-gaza{background:#f0fdf4;color:#065f46;}

  .section-divider{display:flex;align-items:center;gap:16px;padding:24px 40px 12px;background:var(--bg);border-top:2px solid var(--border);}
  .sec-header{display:flex;align-items:center;gap:12px;padding:10px 40px 6px;background:var(--bg);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
  .sec-header:hover{background:#eeeae0;}
  .sec-header-inner{display:flex;align-items:center;gap:12px;flex:1;}
  .sec-label{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);font-family:'DM Mono',monospace;}
  .sec-count{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
  .sec-line{flex:1;height:1px;background:var(--border);}
  .sec-chevron{font-size:11px;color:var(--muted);transition:transform 0.2s;display:inline-block;}
  .sec-chevron.collapsed{transform:rotate(-90deg);}
  .sec-body{overflow:hidden;}
  .sec-body.collapsed{display:none;}
  .section-divider h2{font-family:'Fraunces',serif;font-weight:300;font-size:20px;white-space:nowrap;}
  .section-divider h2 em{font-style:italic;color:#92400e;}
  .section-divider-line{flex:1;height:1px;background:var(--border);}
  .section-count{font-size:11px;color:var(--muted);white-space:nowrap;}

  .list-view{background:var(--surface);}
  .list-header{display:grid;grid-template-columns:60px 1fr 130px 90px 180px 100px;gap:12px;padding:10px 20px;background:var(--bg);border-bottom:2px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);}
  .list-row{display:grid;grid-template-columns:60px 1fr 130px 90px 180px 100px;gap:12px;padding:10px 20px;border-bottom:1px solid var(--border);align-items:center;cursor:pointer;transition:background 0.1s;}
  .list-row:hover{background:#fafaf7;}
  .list-thumb{width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:3px;overflow:hidden;}
  .list-thumb img{max-width:44px;max-height:44px;object-fit:contain;}
  .list-name{font-family:'Fraunces',serif;font-weight:300;font-size:14px;}
  .list-tags{display:flex;flex-wrap:wrap;gap:3px;}
  .list-ticks{display:flex;gap:4px;}
  .ltick{font-size:10px;padding:2px 7px;border-radius:3px;border:1px solid var(--border);cursor:pointer;white-space:nowrap;background:var(--surface);color:var(--muted);transition:all 0.1s;}
  .ltick:hover{border-color:var(--accent);}
  .ltick.on-missing{background:var(--missing-bg);color:var(--missing);border-color:#bbb;}
  .ltick.on-size{background:var(--size-bg);color:var(--size);border-color:var(--size);}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;padding:24px;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:8px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;padding:32px;position:relative;}
  .modal-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1;}
  .modal-emblem{text-align:center;padding:24px;background:var(--bg);border-radius:6px;margin-bottom:20px;}
  .modal-emblem img{max-height:200px;max-width:100%;object-fit:contain;}
  .modal h2{font-family:'Fraunces',serif;font-weight:300;font-size:22px;margin-bottom:4px;}
  .modal-he{direction:rtl;color:var(--muted);margin-bottom:16px;font-size:14px;}
  .modal-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:20px;}
  .modal-fields{display:grid;grid-template-columns:130px 1fr;gap:8px 12px;font-size:12px;margin-bottom:20px;}
  .modal-label{color:var(--muted);}
  .modal-value{word-break:break-all;}
  .modal-value a{color:var(--accent);text-decoration:none;}
  .modal-value a:hover{text-decoration:underline;}
  .modal-note label{font-size:11px;color:var(--muted);display:block;margin-bottom:6px;}
  .modal-note textarea{width:100%;font-family:'DM Mono',monospace;font-size:12px;padding:8px;border:1px solid var(--border);border-radius:4px;resize:vertical;min-height:60px;outline:none;color:var(--text);}
  .modal-note textarea:focus{border-color:var(--accent);}
  .note-save{margin-top:8px;font-family:'DM Mono',monospace;font-size:11px;padding:5px 12px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;}
  .note-ok{margin-left:10px;font-size:11px;color:var(--muted);display:none;}
  .empty{padding:80px;text-align:center;color:var(--muted);background:var(--surface);}
  .loading{padding:80px;text-align:center;color:var(--muted);}
</style>
</head>
<body>
<header>
  <h1>Israeli Municipal <em>Emblems</em></h1>
  <p>Encyclopedia / index of coats of arms for all ~250 Israeli municipalities</p>
  <div class="stats" id="stats"></div>
</header>

<div class="controls">
  <div class="controls-row">
    <input type="text" id="search" placeholder="Search by name, district…">
    <span class="controls-label">Sort:</span>
    <select class="sort-select" id="sort">
      <option value="importance" selected>City → Regional → Local</option>
      <option value="name">Name A–Z</option>
      <option value="name-desc">Name Z–A</option>
      <option value="type">Type</option>
      <option value="district">District</option>
    </select>
    <span class="count" id="count" style="font-size:13px;font-weight:500;color:var(--text)"></span>
    <div class="right-controls">
      <button class="export-btn" id="export-btn">⬇ Export</button>
      <div class="vdivider"></div>
      <button class="view-btn active" id="btn-grid">⊞</button>
      <button class="view-btn" id="btn-list">☰</button>
    </div>
  </div>
  <div class="controls-row">
    <div class="btn-group">
      <button class="filter-btn active" data-group="coa" data-value="coa">🏛 COA</button>
      <button class="filter-btn" data-group="coa" data-value="obsolete">📜 Obsolete</button>
    </div>
    <div class="vdivider"></div>
    <div class="btn-group">
      <button class="flag-btn" id="flag-missing">❌ Missing</button>
      <button class="flag-btn" id="flag-size">📐 Small file</button>
    </div>
    <div class="vdivider"></div>
    <div class="btn-group">
      <button class="filter-btn" data-group="type" data-value="city">City</button>
      <button class="filter-btn" data-group="type" data-value="local">Local</button>
      <button class="filter-btn" data-group="type" data-value="regional">Regional</button>
    </div>
    <div class="vdivider"></div>
    <div class="btn-group">
      <button class="filter-btn" data-group="district" data-value="north">North</button>
      <button class="filter-btn" data-group="district" data-value="center">Center</button>
      <button class="filter-btn" data-group="district" data-value="south">South</button>
      <button class="filter-btn" data-group="district" data-value="jerusalem">Jerusalem</button>
      <button class="filter-btn" data-group="district" data-value="haifa">Haifa</button>
      <button class="filter-btn" data-group="district" data-value="tel-aviv">Tel Aviv</button>
      <button class="filter-btn" data-group="district" data-value="golan">Golan</button>
      <button class="filter-btn" data-group="district" data-value="judea-samaria">Judea & Samaria</button>
    </div>
    <div class="vdivider"></div>
    <div class="btn-group">
      <button class="filter-btn" data-group="culture" data-value="jewish">Jewish</button>
      <button class="filter-btn" data-group="culture" data-value="arab">Arab</button>
      <button class="filter-btn" data-group="culture" data-value="mixed">Mixed</button>
      <button class="filter-btn" data-group="culture" data-value="bedouin">Bedouin</button>
      <button class="filter-btn" data-group="culture" data-value="druze">Druze</button>
    </div>
    <div style="width:1px;height:20px;background:var(--border);flex-shrink:0;margin:0 4px;"></div>
    <button class="filter-btn" data-group="culture" data-value="palestinian" style="border-color:#d97706;color:#92400e;">Palestinian</button>
    <div class="btn-group" id="ps-district-filters" style="display:none;">
      <button class="filter-btn" data-group="district" data-value="West Bank">West Bank</button>
      <button class="filter-btn" data-group="district" data-value="Gaza Strip">Gaza Strip</button>
    </div>
  </div>
</div>

<div id="main-content"><div class="loading">Loading…</div></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const GITHUB_USER='itai-raveh', GITHUB_REPO='israel-emblems', BRANCH='main';
const RAW=`https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}`;
const CSV_URL=`${RAW}/data/municipalities.csv`;
const PS_CSV_URL=`${RAW}/data/palestinian_municipalities.csv`;
const STORAGE_KEY='israel-emblems-v4';

const IMG_EXTS=['svg','png','jpg','webp'];

function findBestImage(id,hasCOA,hasLogo,isObsolete){
  // Build URL from CSV knowledge — no file scanning needed
  if(hasCOA){
    // Try SVG first, then common PNG extensions
    const svgName=`${id}-COA.svg`;
    return{
      url:`${RAW}/emblems/svg/${encodeURIComponent(svgName)}`,
      urlFallbacks:[
        `${RAW}/emblems/png/${encodeURIComponent(id+'-COA.png')}`,
        `${RAW}/emblems/png/${encodeURIComponent(id+'-COA.jpg')}`,
        `${RAW}/emblems/png/${encodeURIComponent(id+'-COA.gif')}`,
        `${RAW}/emblems/png/${encodeURIComponent(id+'-COA.webp')}`,
        `${RAW}/emblems/png/${encodeURIComponent(id+'-COA.jpeg')}`,
        `${RAW}/emblems/png/${encodeURIComponent(id+'-COA.tiff')}`,
      ],
      tier:1,label:'COA',name:`${id}-COA`
    };
  }
  if(hasLogo){
    return{
      url:`${RAW}/emblems/svg/${encodeURIComponent(id+'-logo.svg')}`,
      urlFallbacks:[
        `${RAW}/emblems/png/${encodeURIComponent(id+'-logo.png')}`,
        `${RAW}/emblems/png/${encodeURIComponent(id+'-logo.jpg')}`,
      ],
      tier:3,label:'Logo',name:`${id}-logo`
    };
  }
  if(isObsolete){
    return{
      url:`${RAW}/emblems/png/${encodeURIComponent(id+'-COA-obsolete.jpg')}`,
      urlFallbacks:[
        `${RAW}/emblems/png/${encodeURIComponent(id+'-COA-obsolete.png')}`,
        `${RAW}/emblems/svg/${encodeURIComponent(id+'-COA-obsolete.svg')}`,
      ],
      tier:5,label:'Obsolete',name:`${id}-COA-obsolete`
    };
  }
  return null;
}

function loadAnn(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch{return{}}}
function saveAnn(a){localStorage.setItem(STORAGE_KEY,JSON.stringify(a))}
let ANN=loadAnn();
function getA(id){return ANN[id]||{}}
function setA(id,key,val){
  if(!ANN[id])ANN[id]={};
  ANN[id][key]=val;
  if(Object.values(ANN[id]).every(v=>!v))delete ANN[id];
  saveAnn(ANN);
}

function parseCSV(text){
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  const lines=text.split('\n').filter(l=>l.trim());
  const headers=lines[0].split(',');
  return lines.slice(1).map(line=>{
    const vals=[];let cur='',inQ=false;
    for(const ch of line){
      if(ch==='"')inQ=!inQ;
      else if(ch===','&&!inQ){vals.push(cur);cur='';}
      else cur+=ch;
    }
    vals.push(cur);
    const obj={};
    headers.forEach((h,i)=>obj[h.trim()]=(vals[i]||'').trim());
    return obj;
  }).filter(r=>r.id);
}

function enrich(data){
  return data.map(m=>{
    const hasCOA=m.has_coa==='yes';
    const hasLogo=m.has_logo==='yes';
    const isObsolete=m.status==='obsolete';
    m._obsolete=isObsolete||(m.id==='maccabim-reut');
    m._img=findBestImage(m.id,hasCOA,hasLogo,m._obsolete);
    m._isLogo=!m._obsolete&&hasLogo&&!hasCOA;
    m._population=parseInt(m.population)||0;
    m._sizeTier=m.size_tier||'';
    return m;
  });
}

function isMissing(m){
  const a=getA(m.id);
  if('missing' in a) return !!a.missing;
  return m.status==='missing';
}

function effStatus(m){
  if(m._obsolete)return'obsolete';
  const a=getA(m.id);
  if(a.missing||m.status==='missing')return'not-found';
  return m._isLogo?'logo':(m.has_coa==='yes'?'found-png':'found-png');
}

const state={
  view:'grid',sort:'importance',search:'',
  coa:'coa',flagMissing:false,flagSize:false,
  filters:{type:new Set(),district:new Set(),culture:new Set()}
};
let DATA=[];

function matches(m){
  if(state.coa==='coa'&&m._obsolete)return false;
  if(state.coa==='obsolete'&&!m._obsolete)return false;
  const es=effStatus(m);
  if(state.flagMissing&&es!=='not-found')return false;
  if(state.flagSize&&!getA(m.id).size)return false;
  const q=state.search.toLowerCase();
  if(q&&![m.id,m.name_en,m.name_he,m.district,m.type,m.culture].some(v=>(v||'').toLowerCase().includes(q)))return false;
  const{type,district,culture}=state.filters;
  if(type.size&&!type.has((m.type||'').toLowerCase()))return false;
  if(district.size&&!district.has((m.district||'').toLowerCase()))return false;
  if(culture.size&&!culture.has((m.culture||'').toLowerCase()))return false;
  return true;
}

const TYPE_RANK={'city':0,'regional':1,'local':2};

// Population lookup (CBS 2021 estimates)
const POP={
  'tel-aviv':460000,'jerusalem':970000,'haifa':285000,'rishon-lezion':257128,
  'petah-tikva':252270,'ashdod':225975,'netanya':224066,'beer-sheva':211251,
  'bnei-brak':210000,'holon':200000,'ramat-gan':162000,'ashkelon':149160,
  'rehovot':147878,'bat-yam':159000,'modiin-illit':80000,'lod':82629,
  'raanana':78562,'rahat':76237,'herzliya':100000,'kfar-saba':101801,
  'hadera':100000,'rosh-haayin':71651,'beitar-illit':70000,'hod-hasharon':65363,
  'kiryat-gat':60582,'givatayim':59000,'afula':59075,'umm-al-fahm':58000,

function getPop(m){ return m._population||POP[m.id]||0; }

// Section assignment for Israeli municipalities
function getSection(m){
  const t=m.type;
  if(t==='regional') return 1; // section B
  if(t==='city') return 0;     // section A
  // local: by population
  return 2; // section C
}
// Within section A: city+local with pop>=20000 treated as "urban"
// Actually: section A = city OR local>=20000, B = regional, C = rest
function getSectionV2(m){
  if(m.type==='regional') return 1;
  const pop=getPop(m);
  if(m.type==='city'||pop>=20000) return 0;
  return 2;
}

function sorted(data){
  return[...data].sort((a,b)=>{
    switch(state.sort){
      case'importance':{
        const aMissing=isMissing(a)?1:0, bMissing=isMissing(b)?1:0;
        if(aMissing!==bMissing)return aMissing-bMissing;
        const sa=getSectionV2(a), sb=getSectionV2(b);
        if(sa!==sb)return sa-sb;
        // within section: sort by population desc, then name
        const pa=getPop(a), pb=getPop(b);
        if(pa!==pb)return pb-pa;
        return(a.name_en||'').localeCompare(b.name_en||'');
      }
      case'name':return(a.name_en||'').localeCompare(b.name_en||'');
      case'name-desc':return(b.name_en||'').localeCompare(a.name_en||'');
      case'type':return(a.type||'').localeCompare(b.type||'');
      case'district':return(a.district||'').localeCompare(b.district||'');
      default:return 0;
    }
  });
}

function onImgError(el){
  var fb=(el.getAttribute('data-fb')||'').split('|').filter(Boolean);
  if(fb.length){el.src=fb[0];el.setAttribute('data-fb',fb.slice(1).join('|'));}
  else{el.style.display='none';var n=el.nextElementSibling;if(n)n.style.display='block';}
}
function ih(m,size=80){
  if(!m._img)return '<span class="no-image">&#9633;</span>';
  const fb=(m._img.urlFallbacks||[]).join('|');
  return '<img src="'+m._img.url+'" data-fb="'+fb+'" alt="'+m.name_en+'" loading="lazy" style="max-height:'+size+'px;max-width:100%;object-fit:contain" onerror="onImgError(this)">'+'<span class="no-image" style="display:none">&#9633;</span>';
}

function tierBadge(img){
  if(!img||img.tier===5)return'';
  const cls=['','t1','t2','t3','t4'][img.tier]||'';
  return`<span class="img-tier ${cls}">${img.label}</span>`;
}

function cb(culture){if(!culture)return'';return`<span class="badge badge-${culture.toLowerCase()}">${culture}</span>`;}
function tb(type){if(!type)return'';return`<span class="badge badge-${type.toLowerCase()}">${type}</span>`;}
function logoBadge(m){return m._isLogo?`<span class="badge badge-logo">🏷 Logo</span>`:'';}
function smallBadge(m){return getA(m.id).size?`<span class="badge badge-size">📐 Small</span>`:'';}

function cardHTML(m){
  const a=getA(m.id);
  const isPalestinian=m.culture==='palestinian';
  const localName=isPalestinian&&m.name_ar
    ?`<div class="card-name-he" style="font-size:10px;color:var(--muted);direction:rtl;text-align:right;">${m.name_he}</div>
       <div class="card-name-he" style="font-size:10px;color:var(--muted);direction:rtl;text-align:right;">${m.name_ar}</div>`
    :`<div class="card-name-he">${m.name_he}</div>`;
  return`<div class="card" data-id="${m.id}" data-clickable="1">
    <div class="emblem-wrap">${ih(m,80)}${m._img?tierBadge(m._img):''}</div>
    <div><div class="card-name">${m.name_en}</div>${localName}</div>
    <div class="card-meta">${m.district||''}</div>
    <div class="card-tags">${tb(m.type)}${cb(m.culture)}${logoBadge(m)}${smallBadge(m)}</div>
    ${m._obsolete?'':`<div class="card-ticks" data-stop="1">
      <label class="tick t-missing${isMissing(m)?' on':''}">
        <input type="checkbox" data-ann="missing" data-id="${m.id}" ${isMissing(m)?'checked':''}> Missing
      </label>
      <label class="tick t-size${a.size?' on':''}">
        <input type="checkbox" data-ann="size" data-id="${m.id}" ${a.size?'checked':''}> Small file
      </label>
    </div>`}
  </div>`;
}

function listHTML(m){
  const a=getA(m.id);
  const isPalestinian=m.culture==='palestinian';
  const heCell=isPalestinian&&m.name_ar
    ?`<div style="text-align:right"><div style="direction:rtl;font-size:12px;color:var(--muted)">${m.name_he}</div><div style="direction:rtl;font-size:11px;color:var(--muted);opacity:.7">${m.name_ar}</div></div>`
    :`<div style="direction:rtl;font-size:12px;color:var(--muted)">${m.name_he}</div>`;
  return`<div class="list-row" data-id="${m.id}" data-clickable="1">
    <div class="list-thumb">${ih(m,44)}</div>
    <div><div class="list-name">${m.name_en}</div><div style="font-size:10px;color:var(--muted)">${m.district||''}</div></div>
    ${heCell}
    <div>${tb(m.type)}</div>
    <div class="list-tags">${cb(m.culture)}${logoBadge(m)}${smallBadge(m)}</div>
    <div class="list-ticks" data-stop="1">
      ${m._obsolete?'':`<span class="ltick${isMissing(m)?' on-missing':''}" data-ann="missing" data-id="${m.id}">Missing</span>
      <span class="ltick${a.size?' on-size':''}" data-ann="size" data-id="${m.id}">Small file</span>`}
    </div>
  </div>`;
}

function toggleSection(sid){
  state._secCollapsed=state._secCollapsed||{};
  state._secCollapsed[sid]=!state._secCollapsed[sid];
  const body=document.getElementById(sid);
  const header=body&&body.previousElementSibling;
  if(body)body.classList.toggle('collapsed',!!state._secCollapsed[sid]);
  if(header){const ch=header.querySelector('.sec-chevron');if(ch)ch.classList.toggle('collapsed',!!state._secCollapsed[sid]);}
}
function render(){
  const filtered=sorted(DATA.filter(matches));
  const israeli=filtered.filter(m=>m.culture!=='palestinian');
  const palestinian=filtered.filter(m=>m.culture==='palestinian');

  document.getElementById('count').textContent=`${filtered.length} of ${DATA.length}`;
  const container=document.getElementById('main-content');
  if(!filtered.length){container.innerHTML='<div class="empty">No results.</div>';return;}

  let html='';

  if(israeli.length){
    const secA=israeli.filter(m=>getSectionV2(m)===0);
    const secB=israeli.filter(m=>getSectionV2(m)===1);
    const secC=israeli.filter(m=>getSectionV2(m)===2);

    const _secCollapsed=state._secCollapsed=state._secCollapsed||{};
    function renderSection(items,label,isFirst){
      if(!items.length)return'';
      const sid='sec-'+label.replace(/[^a-z]/gi,'-');
      const collapsed=!!_secCollapsed[sid];
      const dividerStyle=isFirst?'':'border-top:2px solid var(--border);';
      let s=`<div class="sec-header" style="${dividerStyle}" onclick="toggleSection('${sid}')">
        <div class="sec-header-inner">
          <span class="sec-label">${label}</span>
          <div class="sec-line"></div>
          <span class="sec-count">${items.length}</span>
        </div>
        <span class="sec-chevron${collapsed?' collapsed':''}">▾</span>
      </div>`;
      let body='';
      if(state.view==='grid'){
        body=`<div class="grid">${items.map(cardHTML).join('')}</div>`;
      }else{
        body=`<div class="list-view"><div class="list-header"><div>Emblem</div><div>Name</div><div>Hebrew</div><div>Type</div><div>Tags</div><div>Mark</div></div>${items.map(listHTML).join('')}</div>`;
      }
      s+=`<div class="sec-body${collapsed?' collapsed':''}" id="${sid}">${body}</div>`;
      return s;
    }

    if(state.sort==='importance'){
      html+=renderSection(secA,'Cities & Towns',true);
      html+=renderSection(secB,'Regional Councils',false);
      html+=renderSection(secC,'Local Councils',false);
    }else{
      if(state.view==='grid'){
        html+=`<div class="grid">${israeli.map(cardHTML).join('')}</div>`;
      }else{
        html+=`<div class="list-view"><div class="list-header"><div>Emblem</div><div>Name</div><div>Hebrew</div><div>Type</div><div>Tags</div><div>Mark</div></div>${israeli.map(listHTML).join('')}</div>`;
      }
    }
  }

  if(palestinian.length){
    const wbCount=palestinian.filter(m=>m.district==='West Bank').length;
    const gzCount=palestinian.filter(m=>m.district==='Gaza Strip').length;
    const subLabel=[wbCount&&`${wbCount} West Bank`,gzCount&&`${gzCount} Gaza`].filter(Boolean).join(' · ');
    html+=`<div class="section-divider">
      <h2>Palestinian <em>Emblems</em></h2>
      <div class="section-divider-line"></div>
      <span class="section-count">${palestinian.length} shown${subLabel?' ('+subLabel+')':''}</span>
    </div>`;
    if(state.view==='grid'){
      html+=`<div class="grid">${palestinian.map(cardHTML).join('')}</div>`;
    }else{
      html+=`<div class="list-view">
        <div class="list-header"><div>Emblem</div><div>Name</div><div>Hebrew / Arabic</div><div>Type</div><div>Tags</div><div>Mark</div></div>
        ${palestinian.map(listHTML).join('')}
      </div>`;
    }
  }

  container.innerHTML=html;

  container.querySelectorAll('input[data-ann]').forEach(inp=>{
    inp.addEventListener('change',e=>{
      e.stopPropagation();
      setA(inp.dataset.id,inp.dataset.ann,inp.checked||false);
      renderStats(DATA);render();
    });
  });
  container.querySelectorAll('.ltick').forEach(tick=>{
    tick.addEventListener('click',e=>{
      e.stopPropagation();
      setA(tick.dataset.id,tick.dataset.ann,!getA(tick.dataset.id)[tick.dataset.ann]);
      renderStats(DATA);render();
    });
  });
  container.querySelectorAll('[data-clickable]').forEach(el=>{
    el.addEventListener('click',e=>{
      if(e.target.closest('[data-stop]'))return;
      const m=DATA.find(d=>d.id===el.dataset.id);
      if(m)openModal(m);
    });
  });
}

function renderStats(data){
  const c={found:0,logo:0,missing:0,obsolete:0,palestinian:0};
  data.forEach(m=>{
    if(m.culture==='palestinian'){c.palestinian++;return;}
    const s=effStatus(m);
    if(s==='found-svg'||s==='found-png')c.found++;
    else if(s==='logo')c.logo++;
    else if(s==='obsolete')c.obsolete++;
    else c.missing++;
  });
  document.getElementById('stats').innerHTML=[
    {label:'Found',key:'found',color:'#1a6b3a'},
    {label:'Logo only',key:'logo',color:'#3730a3'},
    {label:'Missing',key:'missing',color:'#444'},
    {label:'Obsolete',key:'obsolete',color:'#5a4a00'},
    {label:'Palestinian',key:'palestinian',color:'#92400e'},
  ].map(i=>`<div class="stat"><div class="stat-dot" style="background:${i.color}"></div><span>${c[i.key]||0} ${i.label}</span></div>`).join('');
}

function openModal(m){
  const a=getA(m.id);
  const imgH=m._img?`<img src="${m._img.url}" alt="${m.name_en}">`:'<span style="color:#ccc;font-size:48px">◻</span>';
  const commonsLink=m.commons_url?`<a href="${m.commons_url}" target="_blank">${(m.commons_filename||'').replace('File:','')}</a>`:'—';
  const isPalestinian=m.culture==='palestinian';
  const heBlock=isPalestinian&&m.name_ar
    ?`<div class="modal-he">${m.name_he}</div><div class="modal-he" style="font-size:13px;opacity:.75">${m.name_ar}</div>`
    :`<div class="modal-he">${m.name_he}</div>`;
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-emblem">${imgH}</div>
    <h2>${m.name_en}</h2>
    ${heBlock}
    <div class="modal-tags">
      ${tb(m.type)}${cb(m.culture)}${logoBadge(m)}${smallBadge(m)}
      ${m._img&&m._img.tier<5?`<span class="badge" style="background:#eee;color:#666">${m._img.label}</span>`:''}
    </div>
    <div class="modal-fields">
      <span class="modal-label">ID</span><span class="modal-value">${m.id}</span>
      <span class="modal-label">District</span><span class="modal-value">${m.district||'—'}</span>
      ${isPalestinian?`<span class="modal-label">Governorate</span><span class="modal-value">${m.notes&&m.notes.includes('gov:')?m.notes.replace(/.*gov:\s*/,'').replace(/\s*\|.*/,''):'—'}</span>`:''}
      <span class="modal-label">Commons file</span><span class="modal-value">${commonsLink}</span>
      ${m.notes?`<span class="modal-label">Notes</span><span class="modal-value">${m.notes}</span>`:''}
    </div>
    <div class="modal-note">
      <label>Personal notes (saved in browser)</label>
      <textarea id="modal-note">${a.note||''}</textarea>
      <button class="note-save" id="note-save">Save note</button>
      <span class="note-ok" id="note-ok">✓ Saved</span>
    </div>
  `;
  document.getElementById('note-save').addEventListener('click',()=>{
    setA(m.id,'note',document.getElementById('modal-note').value.trim());
    const ok=document.getElementById('note-ok');
    ok.style.display='inline';setTimeout(()=>ok.style.display='none',2000);
    renderStats(DATA);render();
  });
  document.getElementById('modal-overlay').classList.add('open');
}

function exportAnn(){
  const rows=['id,name_en,missing,small_file,note'];
  DATA.forEach(m=>{
    const a=getA(m.id);
    if(!Object.keys(a).length)return;
    rows.push([
      m.id, m.name_en,
      a.missing?'yes':'',
      a.size?'yes':'',
      `"${(a.note||'').replace(/"/g,'""')}"`
    ].join(','));
  });
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});
  const el=document.createElement('a');el.href=URL.createObjectURL(blob);el.download='emblem-annotations.csv';el.click();
}

async function main(){
  const[csvText,psCsvText]=await Promise.all([
    fetch(CSV_URL).then(r=>r.text()),
    fetch(PS_CSV_URL).then(r=>r.ok?r.text():'').catch(()=>''),
  ]);
  const israeli=enrich(parseCSV(csvText));
  const palestinian=psCsvText?enrich(parseCSV(psCsvText)):[];
  DATA=[...israeli,...palestinian];
  renderStats(DATA);render();

  document.getElementById('search').addEventListener('input',e=>{state.search=e.target.value;render();});
  document.getElementById('sort').addEventListener('change',e=>{state.sort=e.target.value;render();});
  document.getElementById('export-btn').addEventListener('click',exportAnn);

  document.getElementById('btn-grid').addEventListener('click',()=>{
    state.view='grid';
    document.getElementById('btn-grid').classList.add('active');
    document.getElementById('btn-list').classList.remove('active');
    render();
  });
  document.getElementById('btn-list').addEventListener('click',()=>{
    state.view='list';
    document.getElementById('btn-list').classList.add('active');
    document.getElementById('btn-grid').classList.remove('active');
    render();
  });

  document.getElementById('flag-missing').addEventListener('click',function(){
    state.flagMissing=!state.flagMissing;
    this.classList.toggle('active-missing',state.flagMissing);
    render();
  });
  document.getElementById('flag-size').addEventListener('click',function(){
    state.flagSize=!state.flagSize;
    this.classList.toggle('active-size',state.flagSize);
    render();
  });

  document.querySelectorAll('[data-group="coa"]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.coa=btn.dataset.value;
      document.querySelectorAll('[data-group="coa"]').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  ['type','district','culture'].forEach(group=>{
    document.querySelectorAll(`[data-group="${group}"]`).forEach(btn=>{
      btn.addEventListener('click',()=>{
        const v=btn.dataset.value;
        if(state.filters[group].has(v)){state.filters[group].delete(v);btn.classList.remove('active');}
        else{state.filters[group].add(v);btn.classList.add('active');}
        if(group==='culture'){
          const hasPalestinian=state.filters.culture.has('palestinian');
          document.getElementById('ps-district-filters').style.display=hasPalestinian?'flex':'none';
        }
        render();
      });
    });
  });

  document.getElementById('modal-close').addEventListener('click',()=>document.getElementById('modal-overlay').classList.remove('open'));
  document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))document.getElementById('modal-overlay').classList.remove('open');});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('modal-overlay').classList.remove('open');});
}
main();
</script>
